{% extends "layouts/dashboard.html" %}

{% block title %}권한 {{ action }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">권한 {{ action }}</h5>
    <a href="{% url 'role_list' %}" class="btn btn-outline-secondary btn-sm">목록으로</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label fw-semibold">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">{{ action }}</button>
                <a href="{% url 'role_list' %}" class="btn btn-outline-secondary">취소</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
