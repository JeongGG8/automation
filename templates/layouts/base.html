{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <title>{% block title %}automation{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
    <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    {% block extra_css %}{% endblock %}
</head>



<body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom app-header">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">automation</a>

            <div class="d-flex align-items-center gap-3">
                {% if user.is_authenticated %}
                <span class="text-muted small">{{ user.name|default:user.username }} ({{ user.get_role_display }})</span>
                <a class="btn btn-outline-secondary btn-sm" href="{% url 'logout' %}">로그아웃</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="app-body">
    {% block body %}{% endblock %}
    </div>


</body>
</html>
